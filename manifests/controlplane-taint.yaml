apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-taint-sa
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-taint-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-taint-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-taint-role
subjects:
  - kind: ServiceAccount
    name: node-taint-sa
    namespace: kube-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: apply-controlplane-taint
  namespace: kube-system
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: node-taint-sa
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - kubectl
            - taint
            - nodes
            - -l
            - node-role.kubernetes.io/control-plane
            - node-role.kubernetes.io/control-plane=:NoSchedule
            - --overwrite
